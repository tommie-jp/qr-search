# qr.tommie.jp — QR search Ver2 (docker: 127.0.0.1:3000)
#
# このファイルがリポジトリ側の正。vps2 へは ../../doDeployNginx.sh で反映する
# (実体は vps2:/etc/nginx/sites-available/qr.tommie.jp、sites-enabled から symlink)。
# サーバ上で直接編集しないこと。
#
# ローカル再現用の ../../Caddyfile と対になる設定。ボディ上限を変えたら両方に入れること。
#
# 認証はここではやらない (docs/18-ログイン計画.md)。ログインしなくてもヘッダの帯を
# 出すため、Basic 認証はアプリへ移した (src/proxy.ts と src/lib/auth.ts)。
# auth_basic をここに戻すと、どのページを開いてもいきなり認証ダイアログが出る
# 昔の挙動に戻る。公開してよいパス (PWA の manifest / アイコン、使い方の docs) の
# 一覧も src/lib/publicPaths.ts が正本 — かつてここに並べていた
# `auth_basic off` の location 群の移設先。
#
# /etc/nginx/.htpasswd-qr はもう読まれない。パスワードの正本は
# vps2:~/41-QR-search/qr-search/.env の BASIC_AUTH_USER / BASIC_AUTH_HASH_B64。
# 生成: npm run hash-password (docs/18-ログイン計画.md)
#
# ssl_* と http→https リダイレクトは certbot --nginx が生成したもの。

# ログイン試行のレート制限用。認証がアプリへ移ったことで、総当たりが Node と
# bcrypt まで届くようになった (vps2 は非力で、コスト 12 で約 1.75 秒。まさに
# 殴られると痛い場所)。エッジで先に絞る。10m ≒ 16 万アドレス分の状態を持てる。
#
# 30r/m は「人がログインし直す分には絶対に当たらないが、総当たりには効く」線。
# 1 回のログインで /login は 2 往復する (未認証の 401 → 資格情報つきの再送)
# ため、10r/m だと 5 回で頭打ちになり、実際にログインを試していて 503 を
# 踏んだ。bcrypt 自体が 1.75 秒の重しなので、ここは緩めても総当たりは伸びない
limit_req_zone $binary_remote_addr zone=qr_login:10m rate=30r/m;

server {
    server_name qr.tommie.jp;

    # 画像アップロード (10MB) + multipart オーバーヘッドを許容しつつ、
    # 巨大ボディによるメモリ枯渇をエッジで遮断する。
    # 既定は 1MB で、大きめの写真が 413 で弾かれる
    client_max_body_size 12M;

    # location へ継承させるため server レベルに置く
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ログインの口だけ絞る。burst=10 nodelay:
    # nodelay を付けるのは、付けないと超過分が「待たされる」形になり、
    # ただでさえ bcrypt で 1.75 秒待つログインが数十秒黙って固まって見えるため。
    # nodelay なら burst の範囲は即座に通し、超えた分だけ 503 で明確に断る
    location = /login {
        limit_req zone=qr_login burst=10 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    # パスキーの口も同じ枠で絞る (docs/29-パスキー計画.md §9)。
    #
    # 狙いは総当たりではない — 署名は公開鍵で検証するので当てずっぽうでは
    # 通らない。防ぎたいのは「チャレンジ発行の乱打」で、これは 1 回ごとに
    # サーバのメモリ (webauthnChallenge.ts の Map) を消費する。
    #
    # /login と枠を共有してよい。どちらも「人がログインする」動作で、
    # 30r/m は普通に使う分には当たらない
    location ^~ /api/auth/ {
        limit_req zone=qr_login burst=10 nodelay;
        proxy_pass http://127.0.0.1:3000;
    }

    # ENEX インポート (docs/28-エクスポート計画.md §4) だけ枠を広げる。
    # ENEX は 1 ファイルに全ノートと添付を抱えるので、写真が数枚入った
    # ノートが並ぶだけで 12MB を超える。**この口だけ**にするのが要点で、
    # server レベルを広げると画像アップロードの防波堤まで下がる。
    #
    # 超えたときは nginx が 413 を返してボディを読み捨てる。ブラウザからは
    # 送信中に接続が切れたように見え、fetch が "Load failed" で失敗する
    # (JSON のエラーとしては受け取れない)
    location = /api/import {
        client_max_body_size 32M;
        proxy_pass http://127.0.0.1:3000;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/qr.tommie.jp/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/qr.tommie.jp/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = qr.tommie.jp) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name qr.tommie.jp;
    return 404; # managed by Certbot


}
