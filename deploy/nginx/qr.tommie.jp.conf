# qr.tommie.jp — QR search Ver2 (docker: 127.0.0.1:3000)
#
# このファイルがリポジトリ側の正。vps2 へは ../../doDeployNginx.sh で反映する
# (実体は vps2:/etc/nginx/sites-available/qr.tommie.jp、sites-enabled から symlink)。
# サーバ上で直接編集しないこと。
#
# ローカル再現用の ../../Caddyfile と対になる設定。認証まわり・ボディ上限を
# 変えたら両方に入れること。
#
# Basic 認証のパスワードファイル /etc/nginx/.htpasswd-qr はリポジトリ管理外。
# 再発行は vps2 で: sudo htpasswd -c /etc/nginx/.htpasswd-qr tommie
#
# ssl_* と http→https リダイレクトは certbot --nginx が生成したもの。
server {
    server_name qr.tommie.jp;

    # 画像アップロード (10MB) + multipart オーバーヘッドを許容しつつ、
    # 巨大ボディによるメモリ枯渇をエッジで遮断する。
    # 既定は 1MB で、大きめの写真が 413 で弾かれる。
    # location の外に置いて全パスに効かせる: 下の PWA 用 location は認証を
    # 外すため、ここが location の内側だと未認証で巨大なボディを投げ込める
    client_max_body_size 12M;

    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd-qr;

    # location へ継承させるため server レベルに置く
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # PWA: ブラウザは manifest とアイコンを Authorization ヘッダなしで取得するため、
    # ここを認証下に置くと 401 になり「インストール可能」と判定されない。
    # どちらも秘密情報を含まないので公開してよい
    location = /manifest.webmanifest {
        auth_basic off;
        proxy_pass http://127.0.0.1:3000;
    }

    location = /apple-icon.png {
        auth_basic off;
        proxy_pass http://127.0.0.1:3000;
    }

    # icon-192.png / icon-512-maskable.png (PWA) と icon.svg (ブラウザタブ) の両方。
    # svg を含めるのは favicon がベクタ 1 枚だけで全サイズを賄っているため
    location ~ ^/icon(-[^/]*)?\.(png|svg)$ {
        auth_basic off;
        proxy_pass http://127.0.0.1:3000;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/qr.tommie.jp/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/qr.tommie.jp/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = qr.tommie.jp) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name qr.tommie.jp;
    return 404; # managed by Certbot


}
