# qr.tommie.jp — QR search Ver2 (docker: 127.0.0.1:3000)
# 証明書取得前の暫定 http 設定。DNS 切替後に
# sudo certbot --nginx -d qr.tommie.jp で https 化 + リダイレクト追加
server {
    server_name qr.tommie.jp;

    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd-qr;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/qr.tommie.jp/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/qr.tommie.jp/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = qr.tommie.jp) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name qr.tommie.jp;
    return 404; # managed by Certbot


}