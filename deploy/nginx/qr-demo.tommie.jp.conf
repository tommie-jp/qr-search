# qr-demo.tommie.jp — QR search のデモインスタンス (docker: 127.0.0.1:3100)
#
# このファイルがリポジトリ側の正。vps2 へは
#   DEPLOY_SITE=qr-demo.tommie.jp ./doDeployNginx.sh
# で反映する (実体は vps2:/etc/nginx/sites-available/qr-demo.tommie.jp、
# sites-enabled から symlink)。サーバ上で直接編集しないこと。
#
# 本番 (qr.tommie.jp.conf) とは別スタック・別ドメイン (docs/39-デモ公開計画.md §5, §7)。
# 認証はここではやらず、アプリ (別スタックの app) が行う。DEMO_MODE=1 で
# 公開機能・設定系を封じ、アップロード上限を 2MB に縮めるのはアプリ側の責務。
#
# 一度きりの初期設定 (このファイルを反映する前に):
#   1. DNS: qr-demo.tommie.jp の A レコードを vps2 に向ける
#   2. certbot で証明書を発行する (先に発行しないと下の ssl_* が指すファイルが無く
#      nginx -t が失敗する):
#        sudo certbot certonly --nginx -d qr-demo.tommie.jp
#   3. その後この conf を配置 (doDeployNginx.sh)。ssl_* / redirect は本番と同じく
#      certbot が管理する行に揃えてある

# デモ専用のレート制限ゾーン。**本番 (qr_login) とは別ゾーン**にする —
# 共有すると、デモへの総当たりで本番のログインまで絞られてしまう (docs/39 §7)。
# 10m ≒ 16 万アドレス分の状態を持てる。
#
# ログイン枠: 本番と同じ 30r/m (人がログインし直す分には当たらず、総当たりに効く)。
limit_req_zone $binary_remote_addr zone=qr_demo_login:10m rate=30r/m;
# 書き込み枠 (デモだけの追加): 通常操作 (検索・閲覧・保存) は当たらないが、
# スクリプトでの量産は絞る線。実測して調整する。
limit_req_zone $binary_remote_addr zone=qr_demo_write:10m rate=120r/m;

server {
    server_name qr-demo.tommie.jp;

    # 2MB (アプリ側 DEMO の 1 ファイル上限) + multipart オーバーヘッド。
    # 本番の 12M より小さくして、エッジでも大きいボディを弾く (docs/39 §7)
    client_max_body_size 3M;

    # location へ継承させるため server レベルに置く
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ログインの口 (本番 conf と同じ作法。burst=10 nodelay の理由もそちらに書いた)
    location = /login {
        limit_req zone=qr_demo_login burst=10 nodelay;
        proxy_pass http://127.0.0.1:3100;
    }

    # パスキーの口も同じログイン枠で絞る。デモでは登録は封鎖済みだが、
    # ログイン (login-options/verify) は開いており、チャレンジ発行の乱打は防ぎたい
    location ^~ /api/auth/ {
        limit_req zone=qr_demo_login burst=10 nodelay;
        proxy_pass http://127.0.0.1:3100;
    }

    # それ以外はすべて書き込み枠で緩く絞る。通常の閲覧・検索・保存は当たらない
    location / {
        limit_req zone=qr_demo_write burst=30 nodelay;
        proxy_pass http://127.0.0.1:3100;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/qr-demo.tommie.jp/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/qr-demo.tommie.jp/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = qr-demo.tommie.jp) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name qr-demo.tommie.jp;
    return 404; # managed by Certbot


}
