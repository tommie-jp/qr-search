# ディレクトリ名に依存しないよう明示 (コンテナ/ボリューム名の接頭辞)
name: qr-search

services:
  db:
    # 全文検索 (Ver2.1) 用に PGroonga 入り PostgreSQL 16 を使う。
    # postgres:16-alpine と同じ PG16/alpine ベースのためデータ volume はそのまま流用できる。
    image: groonga/pgroonga:4.0.6-alpine-16
    restart: unless-stopped
    environment:
      POSTGRES_USER: qr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: qr
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qr -d qr"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    image: qr-search-app:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://qr:${POSTGRES_PASSWORD}@db:5432/qr
      QR_BASE_URL: ${QR_BASE_URL:-https://qr.tommie.jp}
      # 本番 (vps2) の .env だけが production を立てる。ローカルは未設定のままにし、
      # 画面をピンク + タイトル [LOCAL] にして本番との誤認を防ぐ。
      # 既定を production にしてはいけない (設定漏れが本番の見た目に倒れる)
      APP_ENV: ${APP_ENV:-}
      # JAN の商品情報取得 (docs/14)。未設定でも起動する (取得しないだけ)
      YAHOO_SHOPPING_APP_ID: ${YAHOO_SHOPPING_APP_ID:-}
      # ログイン (docs/18)。認証はエッジではなくアプリが行うので、app に渡す。
      # :? で必須にする — 空だと誰もログインできず、全ページが「ログインが
      # 必要です」になる。起動時に落として気づけるようにする。
      #
      # ハッシュを base64 で持つのは `$` 対策 (src/lib/auth.ts に理由を書いた)。
      # 生 bcrypt を .env に置くと Next.js の env 展開が `$2b$10$…` を
      # 変数参照とみなして値を壊す
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:?BASIC_AUTH_USER is required}
      BASIC_AUTH_HASH_B64: ${BASIC_AUTH_HASH_B64:?BASIC_AUTH_HASH_B64 is required}
    ports:
      # ローカル: tailscale serve 用 / vps2: nginx のプロキシ先 (loopback のみ)
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  # マイグレーションは compose のサービスにしない。ビルド済みイメージ内の
  # prisma/migrations を見るため、イメージが古いと新しい migration を黙って
  # 取りこぼす。doStart.sh / doDeploy.sh のようにホストの prisma CLI から当てること。

  # ローカルテスト専用 (vps2 では既存 nginx が 80/443 を使うため起動しない)
  # 起動: docker compose --profile proxy up -d
  proxy:
    profiles: ["proxy"]
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  # 画像は images テーブルに入れるため uploads volume は持たない
  # (pg_dump だけでメモと画像が揃う)
  db-data:
  caddy-data:
  caddy-config:
