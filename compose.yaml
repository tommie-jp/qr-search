# ディレクトリ名に依存しないよう明示 (コンテナ/ボリューム名の接頭辞)
name: qr-search

services:
  db:
    # 全文検索 (Ver2.1) 用に PGroonga 入り PostgreSQL 16 を使う。
    # postgres:16-alpine と同じ PG16/alpine ベースのためデータ volume はそのまま流用できる。
    image: groonga/pgroonga:4.0.6-alpine-16
    restart: unless-stopped
    environment:
      POSTGRES_USER: qr
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: qr
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qr -d qr"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    image: qr-search-app:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://qr:${POSTGRES_PASSWORD}@db:5432/qr
      QR_BASE_URL: ${QR_BASE_URL:-https://qr.tommie.jp}
      # 本番 (vps2) の .env だけが production を立てる。ローカルは未設定のままにし、
      # 画面をピンク + タイトル [LOCAL] にして本番との誤認を防ぐ。
      # 既定を production にしてはいけない (設定漏れが本番の見た目に倒れる)
      APP_ENV: ${APP_ENV:-}
      # デモモード (docs/38-デモモード計画.md)。隔離デモインスタンス専用で、
      # 本番・ローカルでは空。DEMO_MODE=1 のときだけ公開機能・設定系を閉じ、
      # アップロード上限を縮める。**APP_ENV とは逆で欠落が「保護オフ」に倒れる**
      # ため、デモを立てるときは compose override に DEMO_MODE=1 を直書きする
      DEMO_MODE: ${DEMO_MODE:-}
      # デモのログイン案内 (docs/39-デモ公開計画.md §4)。DEMO_MODE のとき、
      # バナーに出す資格情報の案内文 (例: `ログイン: demo / <パスワード>`)。
      # 未設定なら案内行は出ない。値はデモスタックの .env にだけ置く
      DEMO_LOGIN_HINT: ${DEMO_LOGIN_HINT:-}
      # JAN の商品情報取得 (docs/14)。未設定でも起動する (取得しないだけ)
      YAHOO_SHOPPING_APP_ID: ${YAHOO_SHOPPING_APP_ID:-}
      # ISBN の書影取得 (docs/19)。未設定でも起動する (書影が入らないだけ)。
      # .env に書くだけでは届かない — この列挙に無い変数はコンテナに渡らない
      # (実際に .env だけ直して書影が出ない事故が起きた)
      RAKUTEN_APP_ID: ${RAKUTEN_APP_ID:-}
      RAKUTEN_ACCESS_KEY: ${RAKUTEN_ACCESS_KEY:-}
      RAKUTEN_APP_ORIGIN: ${RAKUTEN_APP_ORIGIN:-}
      # ログイン (docs/18)。認証はエッジではなくアプリが行うので、app に渡す。
      # :? で必須にする — 空だと誰もログインできず、全ページが「ログインが
      # 必要です」になる。起動時に落として気づけるようにする。
      #
      # ハッシュを base64 で持つのは `$` 対策 (src/lib/auth.ts に理由を書いた)。
      # 生 bcrypt を .env に置くと Next.js の env 展開が `$2b$10$…` を
      # 変数参照とみなして値を壊す
      BASIC_AUTH_USER: ${BASIC_AUTH_USER:?BASIC_AUTH_USER is required}
      BASIC_AUTH_HASH_B64: ${BASIC_AUTH_HASH_B64:?BASIC_AUTH_HASH_B64 is required}
      #
      # パスキー (docs/29-パスキー計画.md §7)。**:? を付けない** —
      # 欠けてもパスキーが無効になるだけで、パスワードでは今までどおり
      # 入れる。ログインそのものを止める理由がない。
      #
      # リクエストからは組み立てられない値なので env で渡す (アプリは
      # nginx の内側に居て http://0.0.0.0:3100 しか見えていない)
      WEBAUTHN_RP_ID: ${WEBAUTHN_RP_ID:-}
      WEBAUTHN_ORIGIN: ${WEBAUTHN_ORIGIN:-}
    ports:
      # ローカル: tailscale serve 用 / vps2: nginx のプロキシ先 (loopback のみ)
      - "127.0.0.1:${APP_PORT:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy

  # マイグレーションは compose のサービスにしない。ビルド済みイメージ内の
  # prisma/migrations を見るため、イメージが古いと新しい migration を黙って
  # 取りこぼす。doStart.sh / doDeploy.sh のようにホストの prisma CLI から当てること。

  # ローカルテスト専用 (vps2 では既存 nginx が 80/443 を使うため起動しない)
  # 起動: docker compose --profile proxy up -d
  proxy:
    profiles: ["proxy"]
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-localhost}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app

volumes:
  # 画像は images テーブルに入れるため uploads volume は持たない
  # (pg_dump だけでメモと画像が揃う)
  db-data:
  caddy-data:
  caddy-config:
